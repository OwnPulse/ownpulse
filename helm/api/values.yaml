replicaCount: 2

# Horizontal Pod Autoscaler. Disabled by default so self-hosters get a fixed
# replica count (replicaCount above) with no metrics-server dependency.
# Enabled in production via values-production.yaml. When enabled, the HPA owns
# the replica count and the Deployment omits its `replicas` field.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

image:
  repository: ghcr.io/ownpulse/ownpulse-api
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

containerPort: 8080
metricsPort: 9090

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Security headers are set globally via ingress-nginx ConfigMap add-headers (see ownpulse-infra)
  host: api.ownpulse.health
  tls:
    enabled: true
    secretName: ownpulse-api-tls

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

otelEndpoint: ""  # Set to "https://alloy:4317" when observability stack is installed
otelTlsSecret: "" # Set to "<release>-observability-api-tls" — contains CA cert + client cert for mTLS

configmap:
  RUST_LOG: "info"
  DATA_REGION: "us"
  WEB_ORIGIN: "https://app.ownpulse.health"

secret:
  name: ownpulse-api-secret
  keys:
    - DATABASE_URL
    - JWT_SECRET
    - ENCRYPTION_KEY

smtpSecret: ownpulse-smtp-secrets
