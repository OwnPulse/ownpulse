image:
  repository: ownpulse-api
  tag: local
  pullPolicy: Never

ingress:
  enabled: true
  className: ""
  annotations: {}
  host: api.localhost
  tls:
    enabled: false

configmap:
  RUST_LOG: "debug"
  DATA_REGION: "us"
  WEB_ORIGIN: "http://app.localhost:8080"
  REQUIRE_INVITE: "false"

secret:
  name: ownpulse-api-secret

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "500m"
