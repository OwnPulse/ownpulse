# Staging overrides — Tailscale-only, no public ingress.
ingress:
  enabled: false

configmap:
  RUST_LOG: "debug"
  DATA_REGION: "us"
  WEB_ORIGIN: "https://ownpulse-us.zorse-snake.ts.net:8445"

secret:
  name: ownpulse-staging-api-secrets

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
