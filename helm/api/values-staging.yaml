# Staging overrides — Tailscale-only via ingress-nginx.
# DNS resolves to server's Tailscale IP (CGNAT range, not publicly routable).
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
  host: api.staging.ownpulse.health
  tls:
    enabled: true
    secretName: staging-api-tls

configmap:
  RUST_LOG: "debug"
  DATA_REGION: "us"
  WEB_ORIGIN: "https://app.staging.ownpulse.health"

secret:
  name: ownpulse-staging-api-secrets

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
