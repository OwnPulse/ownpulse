apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ownpulse-api.fullname" . }}
  labels:
    {{- include "ownpulse-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ownpulse-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metricsPort }}"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "ownpulse-api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ownpulse-api.fullname" . }}
            - secretRef:
                name: {{ .Values.secret.name }}
            {{- if .Values.smtpSecret }}
            - secretRef:
                name: {{ .Values.smtpSecret }}
            {{- end }}
          {{- if or .Values.otelEndpoint .Values.otelTlsSecret }}
          env:
            {{- if .Values.otelEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otelEndpoint | quote }}
            {{- end }}
            {{- if .Values.otelTlsSecret }}
            - name: OTEL_EXPORTER_OTLP_CERTIFICATE
              value: /etc/otel/tls/ca.crt
            - name: OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE
              value: /etc/otel/tls/tls.crt
            - name: OTEL_EXPORTER_OTLP_CLIENT_KEY
              value: /etc/otel/tls/tls.key
            {{- end }}
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.otelTlsSecret }}
          volumeMounts:
            - name: otel-tls
              mountPath: /etc/otel/tls
              readOnly: true
          {{- end }}
      {{- if .Values.otelTlsSecret }}
      volumes:
        - name: otel-tls
          secret:
            secretName: {{ .Values.otelTlsSecret }}
      {{- end }}
