apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ownpulse-api.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "ownpulse-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ownpulse-api.name" . }}-migrate
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for database..."
              DB_READY=false
              for i in $(seq 1 30); do
                if api --health-check 2>&1; then
                  DB_READY=true
                  break
                fi
                echo "  attempt $i/30..."
                sleep 2
              done
              if [ "$DB_READY" != "true" ]; then
                echo "Database not reachable after 30 attempts, aborting."
                exit 1
              fi
              echo "Running migrations..."
              api --migrate-only
              echo "Migrations complete."
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
