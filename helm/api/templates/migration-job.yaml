apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ownpulse-api.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "ownpulse-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ownpulse-api.name" . }}-migrate
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["sh", "-c"]
          args:
            - |
              echo "Running migrations..."
              # The API binary runs migrations on startup if MIGRATE=true
              # Alternatively, use sqlx-cli if baked into the image
              api --migrate-only || true
              echo "Migrations complete."
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
            - configMapRef:
                name: {{ include "ownpulse-api.fullname" . }}
