replicas: 1

image:
  repository: grafana/alloy
  tag: v1.8.1
  pullPolicy: IfNotPresent

# Grafana Cloud credentials — must exist as a Secret in the namespace.
# Keys: GRAFANA_CLOUD_URL, GRAFANA_CLOUD_USER, GRAFANA_CLOUD_API_KEY
# Created via SealedSecret in the infra repo.
credentialsSecret: grafana-cloud-credentials

resources:
  requests:
    memory: 48Mi
    cpu: 25m
  limits:
    memory: 128Mi
    cpu: 100m

# Targets to scrape
scrape:
  apiService: ownpulse-api
  apiPort: 80
  metricsPath: /metrics
  interval: 15s
