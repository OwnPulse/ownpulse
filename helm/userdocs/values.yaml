replicaCount: 1

image:
  repository: ghcr.io/ownpulse/ownpulse-userdocs
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

containerPort: 8080

ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" always;
  host: docs.ownpulse.health
  tls:
    enabled: true
    secretName: ownpulse-userdocs-tls

resources:
  requests:
    memory: "16Mi"
    cpu: "10m"
  limits:
    memory: "64Mi"
    cpu: "100m"
