replicaCount: 1

image:
  repository: ghcr.io/ownpulse/ownpulse-web
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 80

containerPort: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Security headers are set globally via ingress-nginx ConfigMap add-headers (see ownpulse-infra)
  host: app.ownpulse.health
  tls:
    enabled: true
    secretName: ownpulse-web-tls

env:
  API_UPSTREAM: api-ownpulse-api.ownpulse.svc.cluster.local:80

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"
