replicaCount: 1

image:
  repository: ghcr.io/ownpulse/ownpulse-web
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 80

containerPort: 80

ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.ownpulse.health; img-src 'self' data:; style-src 'self' 'unsafe-inline'" always;
  host: app.ownpulse.health
  tls:
    enabled: true
    secretName: ownpulse-web-tls

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"
