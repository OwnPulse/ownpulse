replicaCount: 1

image:
  repository: ghcr.io/ownpulse/ownpulse-web
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

containerPort: 80

ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: app.ownpulse.health
  tls:
    enabled: true
    secretName: ownpulse-web-tls

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"
