# Staging overrides — Tailscale-only via ingress-nginx.
# DNS resolves to server's Tailscale IP (CGNAT range, not publicly routable).
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    # Security headers are set globally via ingress-nginx ConfigMap add-headers (see ownpulse-infra)
  host: app.staging.ownpulse.health
  tls:
    enabled: true
    secretName: staging-web-tls

env:
  API_UPSTREAM: api-staging-ownpulse-api:80

resources:
  requests:
    memory: "32Mi"
    cpu: "25m"
  limits:
    memory: "64Mi"
    cpu: "100m"
