apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability.componentName" (dict "component" "loki" "context" $) }}
  labels:
    {{- include "observability.labels" (dict "component" "loki" "context" $) | nindent 4 }}
spec:
  type: {{ .Values.loki.service.type }}
  ports:
    - port: {{ .Values.loki.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9096
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "observability.selectorLabels" (dict "component" "loki" "context" $) | nindent 4 }}
