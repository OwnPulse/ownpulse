apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "observability.componentName" (dict "component" "alloy" "context" $) }}
  labels:
    {{- include "observability.labels" (dict "component" "alloy" "context" $) | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "observability.selectorLabels" (dict "component" "alloy" "context" $) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/alloy-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "observability.selectorLabels" (dict "component" "alloy" "context" $) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "observability.componentName" (dict "component" "alloy" "context" $) }}
      securityContext:
        # Root required to read /var/log/pods on most k8s distributions.
        # Container-level hardening drops all capabilities except DAC_READ_SEARCH.
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: alloy
          image: "{{ .Values.alloy.image.repository }}:{{ .Values.alloy.image.tag }}"
          imagePullPolicy: {{ .Values.alloy.image.pullPolicy }}
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/tmp/alloy
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - name: http
              containerPort: 12345
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.alloy.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: tmp
              mountPath: /tmp/alloy
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/alloy/tls
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - DAC_READ_SEARCH
      volumes:
        - name: config
          configMap:
            name: {{ include "observability.componentName" (dict "component" "alloy" "context" $) }}
        - name: varlog
          hostPath:
            path: /var/log
        - name: tmp
          emptyDir: {}
        {{- if .Values.tls.enabled }}
        - name: tls
          projected:
            sources:
              - secret:
                  name: {{ include "observability.componentName" (dict "component" "alloy" "context" $) }}-tls
                  items:
                    - key: tls.crt
                      path: tls.crt
                    - key: tls.key
                      path: tls.key
                    - key: ca.crt
                      path: ca.crt
        {{- end }}
