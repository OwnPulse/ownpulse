apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "observability.componentName" (dict "component" "loki" "context" $) }}
  labels:
    {{- include "observability.labels" (dict "component" "loki" "context" $) | nindent 4 }}
spec:
  replicas: {{ .Values.loki.replicas }}
  serviceName: {{ include "observability.componentName" (dict "component" "loki" "context" $) }}
  selector:
    matchLabels:
      {{- include "observability.selectorLabels" (dict "component" "loki" "context" $) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/loki-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "observability.selectorLabels" (dict "component" "loki" "context" $) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "observability.componentName" (dict "component" "loki" "context" $) }}
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
      containers:
        - name: loki
          image: "{{ .Values.loki.image.repository }}:{{ .Values.loki.image.tag }}"
          imagePullPolicy: {{ .Values.loki.image.pullPolicy }}
          args:
            - -config.file=/etc/loki/loki.yaml
            - -target=all
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
            - name: grpc
              containerPort: 9096
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/loki
              readOnly: true
            - name: data
              mountPath: /data/loki
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/loki/tls
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: {{ include "observability.componentName" (dict "component" "loki" "context" $) }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ include "observability.componentName" (dict "component" "loki" "context" $) }}-tls
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.loki.persistence.size }}
        {{- if .Values.loki.persistence.storageClass }}
        storageClassName: {{ .Values.loki.persistence.storageClass | quote }}
        {{- end }}
