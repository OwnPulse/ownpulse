apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability.componentName" (dict "component" "tempo" "context" $) }}
  labels:
    {{- include "observability.labels" (dict "component" "tempo" "context" $) | nindent 4 }}
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      log_level: warn
      {{- if .Values.tls.enabled }}
      http_tls_config:
        cert_file: /etc/tempo/tls/tls.crt
        key_file: /etc/tempo/tls/tls.key
        client_auth_type: RequireAndVerifyClientCert
        client_ca_file: /etc/tempo/tls/ca.crt
      {{- end }}

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
              {{- if .Values.tls.enabled }}
              tls:
                cert_file: /etc/tempo/tls/tls.crt
                key_file: /etc/tempo/tls/tls.key
                client_auth_type: RequireAndVerifyClientCert
                client_ca_file: /etc/tempo/tls/ca.crt
              {{- end }}
            http:
              endpoint: 0.0.0.0:4318
              {{- if .Values.tls.enabled }}
              tls:
                cert_file: /etc/tempo/tls/tls.crt
                key_file: /etc/tempo/tls/tls.key
                client_auth_type: RequireAndVerifyClientCert
                client_ca_file: /etc/tempo/tls/ca.crt
              {{- end }}

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1048576
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: {{ .Values.tempo.retention }}

    storage:
      trace:
        backend: local
        local:
          path: /data/tempo/traces
        wal:
          path: /data/tempo/wal
