apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability.componentName" (dict "component" "loki" "context" $) }}
  labels:
    {{- include "observability.labels" (dict "component" "loki" "context" $) | nindent 4 }}
data:
  loki.yaml: |
    auth_enabled: true

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn
      {{- if .Values.tls.enabled }}
      http_tls_config:
        cert_file: /etc/loki/tls/tls.crt
        key_file: /etc/loki/tls/tls.key
        client_auth_type: RequireAndVerifyClientCert
        client_ca_file: /etc/loki/tls/ca.crt
      grpc_tls_config:
        cert_file: /etc/loki/tls/tls.crt
        key_file: /etc/loki/tls/tls.key
        client_auth_type: RequireAndVerifyClientCert
        client_ca_file: /etc/loki/tls/ca.crt
      {{- end }}

    common:
      path_prefix: /data/loki
      storage:
        filesystem:
          chunks_directory: /data/loki/chunks
          rules_directory: /data/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: {{ .Values.loki.retention }}
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 6

    compactor:
      working_directory: /data/loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: filesystem
