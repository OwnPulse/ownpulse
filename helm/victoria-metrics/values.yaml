image:
  repository: victoriametrics/victoria-metrics
  tag: v1.106.1
  pullPolicy: IfNotPresent

replicas: 1

port: 8428

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m

retention: 30d

storage:
  size: 1Gi

service:
  type: ClusterIP
  port: 8428

remoteWrite:
  enabled: false
  secretName: grafana-cloud-credentials
  # Keys expected in the secret:
  #   GRAFANA_CLOUD_URL       — Prometheus remote write endpoint
  #   GRAFANA_CLOUD_USER      — numeric user / instance ID
  #   GRAFANA_CLOUD_API_KEY   — Grafana Cloud API token

scrapeConfig: |
  scrape_configs:
    - job_name: ownpulse-api
      scrape_interval: 15s
      metrics_path: /metrics
      static_configs:
        - targets: ['ownpulse-api:80']
