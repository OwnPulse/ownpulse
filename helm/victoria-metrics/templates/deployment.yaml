apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "victoria-metrics.fullname" . }}
  labels:
    {{- include "victoria-metrics.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  serviceName: {{ include "victoria-metrics.fullname" . }}
  selector:
    matchLabels:
      {{- include "victoria-metrics.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "victoria-metrics.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: victoria-metrics
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -retentionPeriod={{ .Values.retention }}
            - -storageDataPath=/data
            - -promscrape.config=/config/prometheus.yml
            {{- if .Values.remoteWrite.enabled }}
            - -remoteWrite.url=$(GRAFANA_CLOUD_URL)
            - -remoteWrite.basicAuth.username=$(GRAFANA_CLOUD_USER)
            - -remoteWrite.basicAuth.password=$(GRAFANA_CLOUD_API_KEY)
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          {{- if .Values.remoteWrite.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.remoteWrite.secretName }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: {{ include "victoria-metrics.fullname" . }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.storage.size }}
