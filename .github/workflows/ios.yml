name: iOS

on:
  push:
    branches: [main]
    paths: ['ios/**']
    tags: ['v*']
  pull_request:
    paths: ['ios/**']
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ios/.build
          key: spm-${{ hashFiles('ios/OwnPulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Run tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme OwnPulse \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -clonedSourcePackagesDirPath .build \
            | xcbeautify --is-ci
