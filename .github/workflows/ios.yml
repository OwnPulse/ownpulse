name: iOS

# Disabled until self-hosted macOS runner has Xcode installed.
# Run manually: gh api repos/OwnPulse/ownpulse/actions/workflows/ios.yml/dispatches -f ref=main
# Tests pass on macos-15 GitHub-hosted runner (verified 2026-03-21).

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "ios/**"
  #     - ".github/workflows/ios.yml"
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "ios/**"
  #     - ".github/workflows/ios.yml"

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Resolve SPM dependencies
        working-directory: ios
        run: >
          xcodebuild -resolvePackageDependencies
          -scheme OwnPulse
          -clonedSourcePackagesDirPath .spm-cache

      - name: Run Xcode tests
        working-directory: ios
        run: >
          xcodebuild test
          -scheme OwnPulse
          -destination 'platform=iOS Simulator,name=iPhone 16'
          -clonedSourcePackagesDirPath .spm-cache
