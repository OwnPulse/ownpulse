name: Web

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  test:
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsc --noEmit

      - name: Run tests with coverage
        run: |
          npx vitest run --coverage 2>&1 | tee coverage-output.txt

      - name: Parse coverage percentage
        id: coverage
        run: |
          STMT_COV=$(grep "All files" coverage-output.txt | awk '{print $4}' | sed 's/%//')
          echo "percentage=$STMT_COV" >> "$GITHUB_OUTPUT"
          echo "Web statement coverage: ${STMT_COV}%"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-report
          path: web/coverage/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const percentage = '${{ steps.coverage.outputs.percentage }}';
            const body = `## Web Coverage\n\n**Statement coverage: ${percentage}%**\n\n[Download full report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) → Artifacts → web-coverage-report`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## Web Coverage'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Run E2E tests
        run: npx playwright test || echo "No E2E tests found, skipping"

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          STMT_COV="${{ steps.coverage.outputs.percentage }}"
          if [ "$(echo "$STMT_COV >= 70" | bc -l)" -eq 1 ]; then
            COLOR="brightgreen"
          elif [ "$(echo "$STMT_COV >= 50" | bc -l)" -eq 1 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          mkdir -p /tmp/badges
          cat > /tmp/badges/web-coverage.json << BADGE
          {
            "schemaVersion": 1,
            "label": "web coverage",
            "message": "${STMT_COV}%",
            "color": "${COLOR}"
          }
          BADGE

      - name: Deploy badge to badges branch
        if: github.ref == 'refs/heads/main'
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          git checkout badges 2>/dev/null || git checkout --orphan badges
          cp /tmp/badges/web-coverage.json .
          git add web-coverage.json
          git diff --cached --quiet || git commit -m "Update web coverage badge"
          git push origin badges

  build:
    runs-on: arc-runner-set
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: web
          push: true
          tags: ghcr.io/ownpulse/ownpulse-web:${{ github.sha }}
