name: Web

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsc --noEmit

      # TODO: Add `npx biome check src/ tests/` here after existing violations are fixed

      - name: Run tests with coverage
        run: |
          npx vitest run --coverage 2>&1 | tee coverage-output.txt

      - name: Parse coverage percentage
        id: coverage
        run: |
          STMT_COV=$(grep "All files" coverage-output.txt | awk '{print $4}' | sed 's/%//')
          echo "percentage=$STMT_COV" >> "$GITHUB_OUTPUT"
          echo "Web statement coverage: ${STMT_COV}%"

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: web-coverage-report
          path: web/coverage/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: OwnPulse/gh-actions/coverage-comment@v1
        with:
          percentage: ${{ steps.coverage.outputs.percentage }}
          service: Web
          coverage-type: Statement coverage
          artifact-name: web-coverage-report

      - name: Run E2E tests
        run: |
          if compgen -G "tests/e2e/*.spec.*" > /dev/null; then
            npx playwright install --with-deps chromium
            npx playwright test
          else
            echo "No E2E test files in tests/e2e/, skipping"
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: OwnPulse/gh-actions/coverage-badge@v1
        with:
          percentage: ${{ steps.coverage.outputs.percentage }}
          label: web coverage
          badge-file: web-coverage.json

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: OwnPulse/gh-actions/docker-build-push@v1
        with:
          context: web
          image-name: ownpulse-web
          tag: ${{ github.sha }}
