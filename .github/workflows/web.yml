name: Web

env:
  # Remove after OwnPulse/gh-actions docker-build-push updates to docker/login-action v4
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/web.yml'

  test:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npx biome check src/ tests/

      - name: Run tests with coverage
        run: |
          npx vitest run --coverage 2>&1 | tee coverage-output.txt

      - name: Parse coverage percentage
        id: coverage
        run: |
          STMT_COV=$(grep "All files" coverage-output.txt | awk '{print $4}' | sed 's/%//')
          echo "percentage=$STMT_COV" >> "$GITHUB_OUTPUT"
          echo "Web statement coverage: ${STMT_COV}%"

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: web-coverage-report
          path: web/coverage/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: OwnPulse/gh-actions/coverage-comment@v1
        with:
          percentage: ${{ steps.coverage.outputs.percentage }}
          service: Web
          coverage-type: Statement coverage
          artifact-name: web-coverage-report

      - name: Run E2E tests
        run: |
          if compgen -G "tests/e2e/*.spec.*" > /dev/null; then
            npx playwright install --with-deps chromium
            npx playwright test
          else
            echo "No E2E test files in tests/e2e/, skipping"
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: OwnPulse/gh-actions/coverage-badge@v1
        with:
          percentage: ${{ steps.coverage.outputs.percentage }}
          label: web coverage
          badge-file: web-coverage.json

  result:
    name: Web / result
    if: always()
    needs: [changes, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "Web tests failed"
            exit 1
          fi
          echo "Web gate passed (test result: ${{ needs.test.result }})"

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: OwnPulse/gh-actions/docker-build-push@v1
        with:
          context: web
          image-name: ownpulse-web
          tag: ${{ github.sha }}
