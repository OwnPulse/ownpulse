name: Web

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsc --noEmit

      - name: Run tests with coverage
        run: |
          npx vitest run --coverage 2>&1 | tee coverage-output.txt

      - name: Parse coverage percentage
        id: coverage
        run: |
          STMT_COV=$(grep "All files" coverage-output.txt | awk '{print $4}' | sed 's/%//')
          echo "percentage=$STMT_COV" >> "$GITHUB_OUTPUT"
          echo "Web statement coverage: ${STMT_COV}%"

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: web-coverage-report
          path: web/coverage/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            const percentage = '${{ steps.coverage.outputs.percentage }}';
            const body = `## Web Coverage\n\n**Statement coverage: ${percentage}%**\n\n[Download full report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) → Artifacts → web-coverage-report`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## Web Coverage'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Run E2E tests
        run: |
          if compgen -G "tests/e2e/*.spec.*" > /dev/null; then
            npx playwright install --with-deps chromium
            npx playwright test
          else
            echo "No E2E test files in tests/e2e/, skipping"
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          STMT_COV="${{ steps.coverage.outputs.percentage }}"
          if [ "$(echo "$STMT_COV >= 70" | bc -l)" -eq 1 ]; then
            COLOR="brightgreen"
          elif [ "$(echo "$STMT_COV >= 50" | bc -l)" -eq 1 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          mkdir -p /tmp/badges
          cat > /tmp/badges/web-coverage.json << BADGE
          {
            "schemaVersion": 1,
            "label": "web coverage",
            "message": "${STMT_COV}%",
            "color": "${COLOR}"
          }
          BADGE

      - name: Deploy badge to badges branch
        if: github.ref == 'refs/heads/main'
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          git checkout badges 2>/dev/null || git checkout --orphan badges
          cp /tmp/badges/web-coverage.json .
          git add web-coverage.json
          git diff --cached --quiet || git commit -m "Update web coverage badge"
          git push origin badges

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7
        with:
          context: web
          push: true
          tags: ghcr.io/ownpulse/ownpulse-web:${{ github.sha }}
