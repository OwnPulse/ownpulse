name: Design Tokens Drift

# Dedicated drift gate for the design-token pipeline. The web job (web.yml)
# already runs the generator's vitest idempotency suite; this workflow is the
# strict guard that regenerates the committed outputs from the canonical source
# (docs/design/tokens.json) and fails if the working tree is dirty — i.e. if any
# generated file has drifted from its source. Keeping it separate from web.yml
# means a token drift failure is unambiguous and not buried in the web matrix.

env:
  # Remove after OwnPulse/gh-actions docker-build-push updates to docker/login-action v4
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "docs/design/tokens.json"
      - "tools/design-tokens/**"
      - "web/src/styles/_tokens.css"
      - "ios/OwnPulse/Theme/Tokens.swift"
      - "docs/design/tokens-generated.md"
      - ".github/workflows/design-tokens.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/design/tokens.json"
      - "tools/design-tokens/**"
      - "web/src/styles/_tokens.css"
      - "ios/OwnPulse/Theme/Tokens.swift"
      - "docs/design/tokens-generated.md"
      - ".github/workflows/design-tokens.yml"

permissions:
  contents: read

jobs:
  drift:
    name: Regenerate and diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22

      - name: Install generator deps
        working-directory: tools/design-tokens
        run: npm ci

      - name: Regenerate tokens
        working-directory: tools/design-tokens
        run: npm run build:tokens

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- \
            web/src/styles/_tokens.css \
            ios/OwnPulse/Theme/Tokens.swift \
            docs/design/tokens-generated.md; then
            echo "::error::Generated design-token files are out of sync with docs/design/tokens.json."
            echo "Run 'npm ci && npm run build:tokens' in tools/design-tokens and commit the result."
            exit 1
          fi
          echo "Generated design-token files are in sync with the source."
