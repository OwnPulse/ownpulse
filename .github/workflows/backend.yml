name: Backend

env:
  # Remove after OwnPulse/gh-actions docker-build-push updates to docker/login-action v4
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
      - "schema/**"
      - "pact/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'db/**'
              - 'schema/**'
              - '.github/workflows/backend.yml'

  fmt:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: rustfmt

      - run: cargo fmt --check

  clippy:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - run: cargo clippy -- -D warnings

      - run: cargo sqlx prepare --workspace --check

  test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ownpulse
          POSTGRES_PASSWORD: ownpulse
          POSTGRES_DB: ownpulse
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://ownpulse:ownpulse@localhost:5432/ownpulse
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry and target
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Cache cargo tools
        id: tool-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-tools-llvm-cov-sqlx-cli-v1

      - name: Install cargo tools
        if: steps.tool-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@a164de717a0ee9284c2d9db1c6016a4c339cd333  # v2.69.14
        with:
          tool: cargo-llvm-cov,sqlx-cli

      - name: Run database migrations
        run: sqlx migrate run --source ../db/migrations

      - name: Run tests with coverage
        run: |
          cargo llvm-cov --all-targets --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only 2>&1 | tee coverage-summary.txt

      - name: Parse coverage percentage
        id: coverage
        run: |
          LINE_COV=$(grep TOTAL coverage-summary.txt | awk '{print $(NF-2)}' | sed 's/%//')
          echo "percentage=$LINE_COV" >> "$GITHUB_OUTPUT"
          echo "Backend line coverage: ${LINE_COV}%"

      - name: Generate coverage HTML report
        if: github.ref == 'refs/heads/main'
        run: |
          cargo llvm-cov --all-targets --html --output-dir coverage-html

      - name: Upload coverage report
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: backend-coverage-report
          path: backend/coverage-html/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: OwnPulse/gh-actions/coverage-comment@v1
        with:
          percentage: ${{ steps.coverage.outputs.percentage }}
          service: Backend
          coverage-type: Line coverage
          artifact-name: backend-coverage-report

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: OwnPulse/gh-actions/coverage-badge@v1
        with:
          percentage: ${{ steps.coverage.outputs.percentage }}
          label: backend coverage
          badge-file: backend-coverage.json

  result:
    name: Backend / result
    if: always()
    needs: [changes, fmt, clippy, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.fmt.result }}" == "failure" || \
                "${{ needs.clippy.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" ]]; then
            echo "Backend CI failed"
            echo "  fmt: ${{ needs.fmt.result }}"
            echo "  clippy: ${{ needs.clippy.result }}"
            echo "  test: ${{ needs.test.result }}"
            exit 1
          fi
          echo "Backend gate passed"

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: OwnPulse/gh-actions/docker-build-push@v1
        with:
          context: .
          file: backend/Dockerfile
          image-name: ownpulse-api
          tag: ${{ github.sha }}
