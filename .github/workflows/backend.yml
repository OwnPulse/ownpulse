name: Backend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
      - "schema/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'db/**'
              - 'schema/**'
              - '.github/workflows/backend.yml'

  test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ownpulse
          POSTGRES_PASSWORD: ownpulse
          POSTGRES_DB: ownpulse
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://ownpulse:ownpulse@localhost:5432/ownpulse
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install cargo tools
        uses: taiki-e/install-action@c12d62a803cbdfe2e7263af15f5a9548065cb4f2  # v2
        with:
          tool: cargo-llvm-cov,sqlx-cli

      - name: Run database migrations
        run: sqlx migrate run --source ../db/migrations

      - run: cargo fmt --check

      - run: cargo clippy -- -D warnings

      - run: cargo sqlx prepare --workspace --check

      - name: Run tests with coverage
        run: |
          cargo llvm-cov --all-targets --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only 2>&1 | tee coverage-summary.txt

      - name: Parse coverage percentage
        id: coverage
        run: |
          LINE_COV=$(grep TOTAL coverage-summary.txt | awk '{print $(NF-2)}' | sed 's/%//')
          echo "percentage=$LINE_COV" >> "$GITHUB_OUTPUT"
          echo "Backend line coverage: ${LINE_COV}%"

      - name: Generate coverage HTML report
        run: |
          cargo llvm-cov --all-targets --html --output-dir coverage-html

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: backend-coverage-report
          path: backend/coverage-html/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: OwnPulse/gh-actions/coverage-comment@v1
        with:
          percentage: ${{ steps.coverage.outputs.percentage }}
          service: Backend
          coverage-type: Line coverage
          artifact-name: backend-coverage-report

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: OwnPulse/gh-actions/coverage-badge@v1
        with:
          percentage: ${{ steps.coverage.outputs.percentage }}
          label: backend coverage
          badge-file: backend-coverage.json

  result:
    if: always()
    needs: [changes, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "Backend tests failed"
            exit 1
          fi
          echo "Backend gate passed (test result: ${{ needs.test.result }})"

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: OwnPulse/gh-actions/docker-build-push@v1
        with:
          context: .
          file: backend/Dockerfile
          image-name: ownpulse-api
          tag: ${{ github.sha }}
