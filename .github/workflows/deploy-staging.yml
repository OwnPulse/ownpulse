name: Deploy Staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: [Backend, Web]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Image tag to deploy (defaults to latest main SHA)"
        required: false
        default: ""

jobs:
  deploy-staging:
    runs-on: arc-runner-set
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      INPUT_SHA: ${{ github.event.inputs.sha }}
      CURRENT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Verify both Backend and Web succeeded
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            for (const workflow of ['backend.yml', 'web.yml']) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: workflow, head_sha: sha, status: 'success',
              });
              if (runs.data.total_count === 0) {
                core.setFailed(`No successful ${workflow} run for SHA ${sha}`);
                return;
              }
            }
            core.info(`Both Backend and Web succeeded for ${sha}`);

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "$INPUT_SHA" ]; then
            echo "tag=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Validate staging Helm charts
        run: |
          helm lint helm/api -f helm/api/values-staging.yaml
          helm lint helm/web -f helm/web/values-staging.yaml
          helm lint helm/postgres -f helm/postgres/values-staging.yaml
          # Verify no Ingress resources are generated for staging
          if helm template api-staging helm/api -f helm/api/values-staging.yaml | grep -q "kind: Ingress"; then
            echo "ERROR: Staging API chart should not generate Ingress resources"
            exit 1
          fi
          if helm template web-staging helm/web -f helm/web/values-staging.yaml | grep -q "kind: Ingress"; then
            echo "ERROR: Staging Web chart should not generate Ingress resources"
            exit 1
          fi
          echo "All staging Helm charts validated"

      - name: Ensure staging namespace exists
        run: kubectl create namespace ownpulse-staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Postgres (staging)
        run: >
          helm upgrade --install postgres-staging helm/postgres
          -n ownpulse-staging
          -f helm/postgres/values-staging.yaml

      - name: Wait for Postgres ready
        run: kubectl rollout status statefulset/postgres-staging-ownpulse-postgres -n ownpulse-staging --timeout=120s

      - name: Deploy API (staging)
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: >
          helm upgrade --install api-staging helm/api
          -n ownpulse-staging
          -f helm/api/values-staging.yaml
          --set "image.tag=$IMAGE_TAG"

      - name: Verify API rollout
        id: api-rollout
        run: kubectl rollout status deployment/api-staging-ownpulse-api -n ownpulse-staging --timeout=120s

      - name: Rollback API on failure
        if: failure() && steps.api-rollout.outcome == 'failure'
        run: helm rollback api-staging -n ownpulse-staging

      - name: Deploy Web (staging)
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: >
          helm upgrade --install web-staging helm/web
          -n ownpulse-staging
          -f helm/web/values-staging.yaml
          --set "image.tag=$IMAGE_TAG"

      - name: Verify Web rollout
        id: web-rollout
        run: kubectl rollout status deployment/web-staging-ownpulse-web -n ownpulse-staging --timeout=120s

      - name: Rollback Web on failure
        if: failure() && steps.web-rollout.outcome == 'failure'
        run: helm rollback web-staging -n ownpulse-staging

      - name: Register Tailscale Serve for staging
        run: |
          STAGING_API_IP=$(kubectl get svc api-staging-ownpulse-api -n ownpulse-staging -o jsonpath='{.spec.clusterIP}')
          STAGING_WEB_IP=$(kubectl get svc web-staging-ownpulse-web -n ownpulse-staging -o jsonpath='{.spec.clusterIP}')
          tailscale serve --https=8444 off 2>/dev/null || true
          tailscale serve --bg --https=8444 "http://$STAGING_API_IP:80"
          tailscale serve --https=8445 off 2>/dev/null || true
          tailscale serve --bg --https=8445 "http://$STAGING_WEB_IP:80"
          echo "Staging API: https://ownpulse-us.zorse-snake.ts.net:8444"
          echo "Staging Web: https://ownpulse-us.zorse-snake.ts.net:8445"

      - name: Smoke test
        run: |
          for i in $(seq 1 10); do
            if kubectl run smoke-staging-$(date +%s) --rm -i --restart=Never --image=busybox -n ownpulse-staging -- wget -qO- http://api-staging-ownpulse-api:80/api/v1/health 2>/dev/null | grep -q '"ok"'; then
              echo "Staging API health check passed"
              exit 0
            fi
            echo "Waiting for staging API... ($i/10)"
            sleep 5
          done
          echo "Smoke test failed"
          exit 1
