name: User Docs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "userdocs/**"
      - ".github/workflows/userdocs.yml"
  pull_request:
    branches: [main]
    paths:
      - "userdocs/**"
      - ".github/workflows/userdocs.yml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: userdocs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build docs (strict validation)
        run: mkdocs build --strict

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: OwnPulse/gh-actions/docker-build-push@v1
        with:
          context: userdocs
          image-name: ownpulse-userdocs
          tag: ${{ github.sha }}
