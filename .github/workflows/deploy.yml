name: Deploy

on:
  workflow_run:
    workflows: [Backend, Web, User Docs]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'helm/**'
  workflow_dispatch:
    inputs:
      sha:
        description: "Override image tag for ALL services (leave blank for per-service latest)"
        required: false
        default: ""

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  resolve-tags:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      api-tag: ${{ steps.tags.outputs.api }}
      web-tag: ${{ steps.tags.outputs.web }}
      userdocs-tag: ${{ steps.tags.outputs.userdocs }}
      ready: ${{ steps.tags.outputs.ready }}
    steps:
      - name: Resolve per-service image tags
        id: tags
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          INPUT_SHA: ${{ github.event.inputs.sha }}
        with:
          script: |
            const inputSha = process.env.INPUT_SHA;

            const services = [
              { name: 'api', workflow: 'backend.yml' },
              { name: 'web', workflow: 'web.yml' },
              { name: 'userdocs', workflow: 'userdocs.yml' },
            ];

            // Manual dispatch with explicit SHA — use it for all services
            if (inputSha) {
              core.info(`Manual override: using ${inputSha} for all services`);
              for (const svc of services) {
                core.setOutput(svc.name, inputSha);
              }
              core.setOutput('ready', 'true');
              return;
            }

            // Manual dispatch without SHA or push (Helm/workflow changes) —
            // use each service's latest successful build
            if (context.eventName === 'workflow_dispatch' || context.eventName === 'push') {
              core.info(`${context.eventName}: resolving latest successful build per service`);
              for (const svc of services) {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: svc.workflow,
                  branch: 'main',
                  status: 'success',
                  per_page: 1,
                });
                if (runs.data.workflow_runs.length === 0) {
                  core.setFailed(`No successful ${svc.workflow} run found on main`);
                  return;
                }
                const sha = runs.data.workflow_runs[0].head_sha;
                core.setOutput(svc.name, sha);
                core.info(`${svc.name}: ${sha}`);
              }
              core.setOutput('ready', 'true');
              return;
            }

            // Auto-trigger: use the triggering SHA for services that built it,
            // and fall back to each service's latest successful build on main
            // for services not affected by this commit.
            const targetSha = context.payload.workflow_run.head_sha;
            core.info(`Resolving tags for commit ${targetSha}`);

            for (const svc of services) {
              // Try the triggering SHA first
              let runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: svc.workflow,
                branch: 'main',
                status: 'success',
                head_sha: targetSha,
                per_page: 1,
              });
              if (runs.data.workflow_runs.length > 0) {
                core.setOutput(svc.name, targetSha);
                core.info(`${svc.name}: built at ${targetSha}`);
                continue;
              }

              // Fall back to latest successful build on main
              runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: svc.workflow,
                branch: 'main',
                status: 'success',
                per_page: 1,
              });
              if (runs.data.workflow_runs.length === 0) {
                core.setFailed(`No successful ${svc.workflow} run found on main`);
                return;
              }
              const fallbackSha = runs.data.workflow_runs[0].head_sha;
              core.setOutput(svc.name, fallbackSha);
              core.info(`${svc.name}: using latest build (${fallbackSha})`);
            }

            core.setOutput('ready', 'true');
            core.info('All services resolved, proceeding with deploy');

  # ---------------------------------------------------------------------------
  # Staging
  # ---------------------------------------------------------------------------

  staging-infra:
    needs: resolve-tags
    if: needs.resolve-tags.outputs.ready == 'true'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/v4.1.3/scripts/get-helm-3 | DESIRED_VERSION=v4.1.3 bash

      - name: Validate staging Helm charts
        run: |
          helm lint helm/api -f helm/api/values-staging.yaml
          helm lint helm/web -f helm/web/values-staging.yaml
          helm lint helm/userdocs -f helm/userdocs/values-staging.yaml
          helm lint helm/postgres -f helm/postgres/values-staging.yaml
          echo "All staging Helm charts validated"

      - name: Clean up stuck Postgres release (staging)
        run: |
          STATUS=$(helm status postgres-staging -n ownpulse-staging -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-found")
          if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "postgres-staging is stuck in $STATUS, rolling back"
            helm rollback postgres-staging -n ownpulse-staging 2>/dev/null || \
              helm uninstall postgres-staging -n ownpulse-staging 2>/dev/null || true
          fi

      - name: Deploy Postgres (staging)
        run: >
          helm upgrade --install postgres-staging helm/postgres
          -n ownpulse-staging
          -f helm/postgres/values-staging.yaml
          --force-conflicts --rollback-on-failure --timeout 120s

  staging-services:
    needs: [resolve-tags, staging-infra]
    runs-on: arc-runner-set
    strategy:
      fail-fast: true
      matrix:
        include:
          - release: api-staging
            chart: helm/api
            values: helm/api/values-staging.yaml
            deployment: api-staging-ownpulse-api
            service: api
          - release: web-staging
            chart: helm/web
            values: helm/web/values-staging.yaml
            deployment: web-staging-ownpulse-web
            service: web
          - release: userdocs-staging
            chart: helm/userdocs
            values: helm/userdocs/values-staging.yaml
            deployment: userdocs-staging-ownpulse-userdocs
            service: userdocs
    env:
      API_TAG: ${{ needs.resolve-tags.outputs.api-tag }}
      WEB_TAG: ${{ needs.resolve-tags.outputs.web-tag }}
      USERDOCS_TAG: ${{ needs.resolve-tags.outputs.userdocs-tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/v4.1.3/scripts/get-helm-3 | DESIRED_VERSION=v4.1.3 bash

      - name: Install helm-diff plugin
        run: |
          helm plugin install https://github.com/databus23/helm-diff --version v3.15.3 --verify=false

      - name: Resolve image tag for ${{ matrix.service }}
        id: tag
        run: |
          case "${{ matrix.service }}" in
            api) echo "tag=$API_TAG" >> "$GITHUB_OUTPUT" ;;
            web) echo "tag=$WEB_TAG" >> "$GITHUB_OUTPUT" ;;
            userdocs) echo "tag=$USERDOCS_TAG" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Preview staging changes
        run: |
          VALUES_ARG=""
          if [ -n "${{ matrix.values }}" ]; then
            VALUES_ARG="-f ${{ matrix.values }}"
          fi
          helm diff upgrade "${{ matrix.release }}" "${{ matrix.chart }}" \
            -n ownpulse-staging \
            $VALUES_ARG \
            --set "image.tag=${{ steps.tag.outputs.tag }}" \
            --suppress-secrets \
            --three-way-merge \
            2>&1 | head -c 100000 > /tmp/diff-output.txt || true

      - name: Post diff to step summary
        uses: OwnPulse/gh-actions/helm-diff-comment@v1
        with:
          mode: step-summary
          diff-file: /tmp/diff-output.txt

      - uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: ${{ matrix.release }}
          chart-path: ${{ matrix.chart }}
          namespace: ownpulse-staging
          image-tag: ${{ steps.tag.outputs.tag }}
          values-file: ${{ matrix.values }}
          deployment-name: ${{ matrix.deployment }}

  staging-validate:
    needs: staging-services
    runs-on: arc-runner-set
    steps:
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      # Staging services are now accessible via ingress-nginx at their DNS names
      # (DNS resolves to Tailscale IP). No tailscale serve needed.
      - run: |
          echo "Staging API: https://app.staging.ownpulse.health/api"
          echo "Staging Web: https://app.staging.ownpulse.health"

      - uses: OwnPulse/gh-actions/smoke-test@v1
        with:
          service-url: http://api-staging-ownpulse-api:80/api/v1/health
          namespace: ownpulse-staging
          label: Staging API (direct)

      # Verify the web nginx proxy can reach the API — catches DNS/FQDN
      # resolution issues where the direct service call above would pass
      # but the proxy_pass fails (nginx resolver bypasses search domains).
      - uses: OwnPulse/gh-actions/smoke-test@v1
        with:
          service-url: http://web-staging-ownpulse-web:80/api/v1/health
          namespace: ownpulse-staging
          label: Staging API (via web proxy)

  # ---------------------------------------------------------------------------
  # Production (requires manual approval via GitHub environment)
  # ---------------------------------------------------------------------------

  production-approve:
    needs: staging-validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production deploy approved"

  production-infra:
    needs: [resolve-tags, production-approve]
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/v4.1.3/scripts/get-helm-3 | DESIRED_VERSION=v4.1.3 bash

      - name: Clean up stuck Postgres release (production)
        run: |
          STATUS=$(helm status postgres -n ownpulse -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-found")
          if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "postgres is stuck in $STATUS, rolling back"
            helm rollback postgres -n ownpulse 2>/dev/null || \
              helm uninstall postgres -n ownpulse 2>/dev/null || true
          fi

      - name: Deploy Postgres (idempotent)
        run: helm upgrade --install postgres helm/postgres -n ownpulse --force-conflicts --rollback-on-failure --timeout 120s

  production-services:
    needs: [resolve-tags, production-infra]
    runs-on: arc-runner-set
    strategy:
      fail-fast: true
      matrix:
        include:
          - release: api
            chart: helm/api
            deployment: api-ownpulse-api
            service: api
          - release: web
            chart: helm/web
            deployment: web-ownpulse-web
            service: web
          - release: userdocs
            chart: helm/userdocs
            deployment: userdocs-ownpulse-userdocs
            service: userdocs
    env:
      API_TAG: ${{ needs.resolve-tags.outputs.api-tag }}
      WEB_TAG: ${{ needs.resolve-tags.outputs.web-tag }}
      USERDOCS_TAG: ${{ needs.resolve-tags.outputs.userdocs-tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/v4.1.3/scripts/get-helm-3 | DESIRED_VERSION=v4.1.3 bash

      - name: Install helm-diff plugin
        run: |
          helm plugin install https://github.com/databus23/helm-diff --version v3.15.3 --verify=false

      - name: Resolve image tag for ${{ matrix.service }}
        id: tag
        run: |
          case "${{ matrix.service }}" in
            api) echo "tag=$API_TAG" >> "$GITHUB_OUTPUT" ;;
            web) echo "tag=$WEB_TAG" >> "$GITHUB_OUTPUT" ;;
            userdocs) echo "tag=$USERDOCS_TAG" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Preview production changes
        run: |
          helm diff upgrade "${{ matrix.release }}" "${{ matrix.chart }}" \
            -n ownpulse \
            --set "image.tag=${{ steps.tag.outputs.tag }}" \
            --suppress-secrets \
            --three-way-merge \
            2>&1 | head -c 100000 > /tmp/diff-output.txt || true

      - name: Post diff to step summary
        uses: OwnPulse/gh-actions/helm-diff-comment@v1
        with:
          mode: step-summary
          diff-file: /tmp/diff-output.txt

      - uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: ${{ matrix.release }}
          chart-path: ${{ matrix.chart }}
          namespace: ownpulse
          image-tag: ${{ steps.tag.outputs.tag }}
          deployment-name: ${{ matrix.deployment }}

  production-validate:
    needs: production-services
    runs-on: arc-runner-set
    steps:
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - uses: OwnPulse/gh-actions/smoke-test@v1
        with:
          service-url: http://api-ownpulse-api:80/api/v1/health
          namespace: ownpulse
          label: Production API (direct)

      - uses: OwnPulse/gh-actions/smoke-test@v1
        with:
          service-url: http://web-ownpulse-web:80/api/v1/health
          namespace: ownpulse
          label: Production API (via web proxy)
