name: Deploy Production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: [Deploy Staging]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: arc-runner-set
    environment: production
    if: >
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Resolve SHA from staging deploy
        id: sha
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            core.setOutput('sha', sha);
            core.info(`Deploying to production: ${sha}`);

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Ensure namespace exists
        run: kubectl create namespace ownpulse --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Postgres (idempotent)
        run: helm upgrade --install postgres helm/postgres -n ownpulse

      - name: Wait for Postgres ready
        run: kubectl rollout status statefulset/postgres-ownpulse-postgres -n ownpulse --timeout=120s

      - name: Deploy API
        uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: api
          chart-path: helm/api
          namespace: ownpulse
          image-tag: ${{ steps.sha.outputs.sha }}
          deployment-name: api-ownpulse-api

      - name: Deploy Web
        uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: web
          chart-path: helm/web
          namespace: ownpulse
          image-tag: ${{ steps.sha.outputs.sha }}
          deployment-name: web-ownpulse-web

      - name: Deploy User Docs
        uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: userdocs
          chart-path: helm/userdocs
          namespace: ownpulse
          image-tag: ${{ steps.sha.outputs.sha }}
          deployment-name: userdocs-ownpulse-userdocs

      - name: Smoke test
        uses: OwnPulse/gh-actions/smoke-test@v1
        with:
          service-url: http://api-ownpulse-api:80/api/v1/health
          namespace: ownpulse
          label: Production API
