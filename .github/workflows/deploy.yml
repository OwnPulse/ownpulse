name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: [Backend, Web, User Docs]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Image tag to deploy (defaults to latest main SHA)"
        required: false
        default: ""

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Verify all CI workflows succeeded
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            for (const workflow of ['backend.yml', 'web.yml', 'userdocs.yml']) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: workflow, head_sha: sha, status: 'success',
              });
              if (runs.data.total_count === 0) {
                core.setFailed(`No successful ${workflow} run for SHA ${sha}`);
                return;
              }
            }
            core.info(`All CI workflows succeeded for ${sha}`);

      - name: Resolve image tag
        id: tag
        env:
          INPUT_SHA: ${{ github.event.inputs.sha }}
          CURRENT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          if [ -n "$INPUT_SHA" ]; then
            echo "tag=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Staging
  # ---------------------------------------------------------------------------

  staging-infra:
    needs: verify
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Validate staging Helm charts
        run: |
          helm lint helm/api -f helm/api/values-staging.yaml
          helm lint helm/web -f helm/web/values-staging.yaml
          helm lint helm/userdocs -f helm/userdocs/values-staging.yaml
          helm lint helm/postgres -f helm/postgres/values-staging.yaml
          for chart in api web userdocs; do
            if helm template ${chart}-staging helm/${chart} -f helm/${chart}/values-staging.yaml | grep -q "kind: Ingress"; then
              echo "ERROR: Staging ${chart} chart should not generate Ingress resources"
              exit 1
            fi
          done
          echo "All staging Helm charts validated"

      - name: Deploy Postgres (staging)
        run: >
          helm upgrade --install postgres-staging helm/postgres
          -n ownpulse-staging
          -f helm/postgres/values-staging.yaml

      - name: Wait for Postgres ready
        run: kubectl rollout status statefulset/postgres-staging-ownpulse-postgres -n ownpulse-staging --timeout=120s

  staging-services:
    needs: [verify, staging-infra]
    runs-on: arc-runner-set
    strategy:
      fail-fast: true
      matrix:
        include:
          - release: api-staging
            chart: helm/api
            values: helm/api/values-staging.yaml
            deployment: api-staging-ownpulse-api
          - release: web-staging
            chart: helm/web
            values: helm/web/values-staging.yaml
            deployment: web-staging-ownpulse-web
          - release: userdocs-staging
            chart: helm/userdocs
            values: helm/userdocs/values-staging.yaml
            deployment: userdocs-staging-ownpulse-userdocs
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: ${{ matrix.release }}
          chart-path: ${{ matrix.chart }}
          namespace: ownpulse-staging
          image-tag: ${{ needs.verify.outputs.tag }}
          values-file: ${{ matrix.values }}
          deployment-name: ${{ matrix.deployment }}

  staging-validate:
    needs: staging-services
    runs-on: arc-runner-set
    steps:
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Register Tailscale Serve for staging
        run: |
          STAGING_API_IP=$(kubectl get svc api-staging-ownpulse-api -n ownpulse-staging -o jsonpath='{.spec.clusterIP}')
          STAGING_WEB_IP=$(kubectl get svc web-staging-ownpulse-web -n ownpulse-staging -o jsonpath='{.spec.clusterIP}')
          tailscale serve --https=8444 off 2>/dev/null || true
          tailscale serve --bg --https=8444 "http://$STAGING_API_IP:80"
          tailscale serve --https=8445 off 2>/dev/null || true
          tailscale serve --bg --https=8445 "http://$STAGING_WEB_IP:80"
          echo "Staging API: https://ownpulse-us.zorse-snake.ts.net:8444"
          echo "Staging Web: https://ownpulse-us.zorse-snake.ts.net:8445"

      - uses: OwnPulse/gh-actions/smoke-test@v1
        with:
          service-url: http://api-staging-ownpulse-api:80/api/v1/health
          namespace: ownpulse-staging
          label: Staging API

  # ---------------------------------------------------------------------------
  # Production (requires manual approval via GitHub environment)
  # ---------------------------------------------------------------------------

  production-approve:
    needs: staging-validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production deploy approved"

  production-infra:
    needs: [verify, production-approve]
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Deploy Postgres (idempotent)
        run: helm upgrade --install postgres helm/postgres -n ownpulse

      - name: Wait for Postgres ready
        run: kubectl rollout status statefulset/postgres-ownpulse-postgres -n ownpulse --timeout=120s

  production-services:
    needs: [verify, production-infra]
    runs-on: arc-runner-set
    strategy:
      fail-fast: true
      matrix:
        include:
          - release: api
            chart: helm/api
            deployment: api-ownpulse-api
          - release: web
            chart: helm/web
            deployment: web-ownpulse-web
          - release: userdocs
            chart: helm/userdocs
            deployment: userdocs-ownpulse-userdocs
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: ${{ matrix.release }}
          chart-path: ${{ matrix.chart }}
          namespace: ownpulse
          image-tag: ${{ needs.verify.outputs.tag }}
          deployment-name: ${{ matrix.deployment }}

  production-validate:
    needs: production-services
    runs-on: arc-runner-set
    steps:
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - uses: OwnPulse/gh-actions/smoke-test@v1
        with:
          service-url: http://api-ownpulse-api:80/api/v1/health
          namespace: ownpulse
          label: Production API
