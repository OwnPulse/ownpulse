appId: health.ownpulse.app
---
# Verify the Google OAuth login flow launches correctly.
# The app opens the backend's /auth/google/login endpoint in an
# ASWebAuthenticationSession. The backend sets the CSRF cookie and redirects
# to Google. The session intercepts the ownpulse:// redirect with tokens.
# Maestro cannot drive the web auth session, so this flow asserts the app
# reaches the login screen and the login button is present and actionable.
- launchApp:
    clearState: true
- assertVisible:
    id: "loginButton"
- tapOn:
    id: "loginButton"
# After tapping, the system presents the ASWebAuthenticationSession sheet.
# We assert the sheet appeared by waiting for the authentication cancel button
# that iOS injects into the web auth session UI.
- assertVisible:
    text: "Cancel"
    timeout: 5000
