#
# Maestro E2E flow: HealthKit write-back queue UI.
# Requires an authenticated session with the backend running.
appId: health.ownpulse.app
---
- launchApp

# Navigate to Settings tab
- tapOn:
    text: "Settings"

# The Apple Health section exposes the Write-Back Queue entry point
- assertVisible:
    id: "writeBackQueueLink"
- tapOn:
    id: "writeBackQueueLink"

# Write-Back Queue screen appears
- assertVisible:
    text: "Write-Back Queue"
    timeout: 5000

# The list resolves to either an empty-state message or pending rows.
# Assert the empty state, which is deterministic against a fresh account
# (data flows to Apple Health automatically, so the queue is normally empty).
- assertVisible:
    id: "writeBackEmpty"
    timeout: 5000

# Pull to refresh re-fetches the queue
- swipe:
    direction: DOWN

- assertVisible:
    text: "Write-Back Queue"
    timeout: 5000
