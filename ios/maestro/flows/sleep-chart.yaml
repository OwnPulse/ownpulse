appId: health.ownpulse.app
---
- launchApp
# Home screen must be visible before we check the chart area
- assertVisible:
    id: "syncNowButton"
# The chart GroupBox renders as soon as data loads; wait up to 10 s for
# either the chart itself or the empty-state label to appear.
- waitForAnimationToEnd:
    timeout: 10000
- assertTrue:
    visible: true
    anyOf:
      - id: "sleepChart"
      - id: "sleepChartEmpty"
      - id: "sleepChartError"
