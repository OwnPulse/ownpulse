#
# Maestro E2E flow: connect a Garmin account from Settings.
# Opens the Wearables section, starts the in-app OAuth flow, and verifies the
# OAuth web view is presented. The flow then cancels — completing a real OAuth
# handshake requires live Garmin credentials and is covered by backend
# integration tests. Requires an authenticated session with the backend running.
appId: health.ownpulse.app
---
- launchApp

# Navigate to the Settings tab.
- tapOn:
    text: "Settings"

# Scroll to the Wearables section.
- scrollUntilVisible:
    element:
      id: "wearableStatus-garmin"
    direction: DOWN
    timeout: 8000

# The connect button is shown when Garmin is not yet connected.
- assertVisible:
    id: "connect-garmin"
    optional: true

# Start the in-app OAuth flow.
- tapOn:
    id: "connect-garmin"
    optional: true

# The OAuth web view (or a sign-in prompt) should present in a sheet.
- assertVisible:
    id: "oauthCancelButton-garmin"
    timeout: 8000

# Cancel out of the flow and confirm we return to Settings.
- tapOn:
    id: "oauthCancelButton-garmin"
- assertVisible:
    text: "Settings"
    timeout: 3000
