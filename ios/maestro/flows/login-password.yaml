#
# Maestro E2E flow: sign in with username and password.
# Requires the backend to be running and configured with APP_USER / APP_PASSWORD_HASH.
appId: health.ownpulse.app
---
- launchApp:
    clearState: true

# Confirm the login screen is visible before acting
- assertVisible:
    id: "usernameField"

- tapOn:
    id: "usernameField"
- inputText: "testuser"

- tapOn:
    id: "passwordField"
- inputText: "testpassword"

# Sign In button must be enabled now that both fields are non-empty
- assertVisible:
    id: "passwordSignInButton"

- tapOn:
    id: "passwordSignInButton"

# After successful login the home screen (or an error) should appear.
# The HomeView does not have a fixed accessibility id so we check for the
# absence of the login form as a proxy for success.
- assertNotVisible:
    id: "passwordSignInButton"
    timeout: 10000
