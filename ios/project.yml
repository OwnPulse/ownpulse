name: OwnPulse

configs:
  Debug: debug
  Staging: release
  Release: release

options:
  bundleIdPrefix: health.ownpulse
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true

targets:
  OwnPulse:
    type: application
    platform: iOS
    sources:
      - OwnPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: health.ownpulse.app
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OwnPulse/Info.plist
        CODE_SIGN_ENTITLEMENTS: OwnPulse/OwnPulse.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        ENABLE_HARDENED_RUNTIME: YES
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Staging:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PRODUCT_BUNDLE_IDENTIFIER: health.ownpulse.app.staging
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore health.ownpulse.app.staging"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore health.ownpulse.app"
    configFiles:
      Debug: OwnPulse/Config/Debug.xcconfig
      Staging: OwnPulse/Config/Staging.xcconfig
      Release: OwnPulse/Config/Release.xcconfig
    dependencies:
      - package: GRDB
    entitlements:
      path: OwnPulse/OwnPulse.entitlements
      properties:
        aps-environment: development
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  OwnPulseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - OwnPulseTests
    dependencies:
      - target: OwnPulse
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

schemes:
  OwnPulse:
    build:
      targets:
        OwnPulse: all
        OwnPulseTests: [test]
    test:
      targets:
        - OwnPulseTests
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug": "1"
    run:
      config: Debug
    archive:
      config: Release
  OwnPulse-Staging:
    build:
      targets:
        OwnPulse: all
        OwnPulseTests: [test]
    test:
      targets:
        - OwnPulseTests
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug": "1"
    run:
      config: Staging
    archive:
      config: Staging
