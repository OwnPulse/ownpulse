name: OwnPulse

configs:
  Debug: debug
  Release: release

options:
  bundleIdPrefix: health.ownpulse
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true

targets:
  OwnPulse:
    type: application
    platform: iOS
    sources:
      - OwnPulse
      # Widget VIEW + entry types are compiled into the app too, behind a
      # DEBUG-only harness (WidgetSnapshotHarness), so XCUITest can render and
      # assert all three widget families without a real Home Screen.
      # The `Widget` configurations (WidgetConfigurations.swift), the
      # TimelineProvider (WidgetProvider.swift), and the WidgetBundle `@main`
      # reference the extension-only OwnPulseProvider and stay extension-only.
      - path: OwnPulseWidgets/TodayCheckinWidget.swift
      - path: OwnPulseWidgets/HeroMetricWidget.swift
      - path: OwnPulseWidgets/QuickLogWidget.swift
      - path: OwnPulseWidgets/WidgetSupport.swift
      - path: OwnPulseWidgets/WidgetEntry.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: health.ownpulse.app
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OwnPulse/Info.plist
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        CODE_SIGN_ENTITLEMENTS: OwnPulse/OwnPulse.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        ENABLE_HARDENED_RUNTIME: YES
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        SWIFT_OBJC_BRIDGING_HEADER: OwnPulse/OwnPulse-Bridging-Header.h
        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_ENABLE_OBJC_WEAK: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore health.ownpulse.app"
    configFiles:
      Debug: OwnPulse/Config/Debug.xcconfig
      Release: OwnPulse/Config/Release.xcconfig
    dependencies:
      - package: GRDB
      - target: OwnPulseWidgetsExtension
        embed: true
    entitlements:
      path: OwnPulse/OwnPulse.entitlements
      properties:
        aps-environment: development
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.security.application-groups:
          - group.health.ownpulse.shared

  OwnPulseWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - OwnPulseWidgets
      # Shared, read-only data-channel types — compiled into the widget target
      # too so the extension can decode the snapshot the app writes.
      - OwnPulse/Widgets/WidgetSnapshot.swift
      - OwnPulse/Widgets/WidgetDataPublisher.swift
      # Shared Theme types the widget views + WidgetSnapshot reference.
      # WidgetSnapshot has a `heroTrendDirection: TrendDirection` field and
      # HeroMetricWidget renders the trend arrow, so TrendIndicator.swift must
      # be a widget-target member. TrendIndicator.color reads ChartColors.metric,
      # so ChartColors.swift is pulled in transitively. These were members of
      # the widget target in the committed pbxproj; list them here so a clean
      # `xcodegen generate` keeps the extension compiling.
      - OwnPulse/Theme/TrendIndicator.swift
      - OwnPulse/Theme/ChartColors.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: health.ownpulse.app.widgets
        PRODUCT_NAME: OwnPulseWidgets
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OwnPulseWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: OwnPulseWidgets/OwnPulseWidgets.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore health.ownpulse.app.widgets"
    entitlements:
      path: OwnPulseWidgets/OwnPulseWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.health.ownpulse.shared

  OwnPulseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - OwnPulseTests
    dependencies:
      - target: OwnPulse
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES

  OwnPulseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - OwnPulseUITests
    dependencies:
      - target: OwnPulse
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: OwnPulse

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

schemes:
  OwnPulse:
    build:
      targets:
        OwnPulse: all
        OwnPulseWidgetsExtension: all
        OwnPulseTests: [test]
        OwnPulseUITests: [test]
    test:
      targets:
        - OwnPulseTests
        - OwnPulseUITests
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug": "1"
    run:
      config: Debug
    archive:
      config: Release
